name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  dependency-vulnerability-gate:
    name: Dependency Vulnerability Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Block on high/critical vulnerabilities
        run: npm audit --audit-level=high

      - name: Run Snyk test when token is configured
        if: ${{ secrets.SNYK_TOKEN != '' }}
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  test:
    name: Test & Build
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: strellerminds_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Run linter
        run: npm run lint
        continue-on-error: true
      
      - name: Build project
        run: NODE_OPTIONS="--max-old-space-size=4096" npm run build
      
      - name: Upload build artifacts
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/
          retention-days: 7
  
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Run security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Check for known vulnerabilities
        run: npm audit --json > audit-results.json || true
      
      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: security-audit
          path: audit-results.json
          retention-days: 30

  security-testing:
    name: Security Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Scan for high-severity vulnerabilities
        run: npm audit --audit-level=high --json > high-severity-report.json || true

      - name: Check for critical vulnerabilities (blocks on critical)
        run: npm audit --audit-level=critical
        continue-on-error: true

      - name: Verify security module compiles
        run: NODE_OPTIONS="--max-old-space-size=4096" npx tsc --noEmit
        continue-on-error: true

      - name: Upload high-severity report
        uses: actions/upload-artifact@v4
        with:
          name: high-severity-report
          path: high-severity-report.json
          retention-days: 30

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Check code formatting
        run: npm run format -- --check
        continue-on-error: true
      
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true
      
      - name: Check TypeScript types
        run: npx tsc --noEmit
        continue-on-error: true

  build-docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: strellerminds-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar
      
      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 7

  deploy-preview:
    name: Deployment Info
    runs-on: ubuntu-latest
    needs: [dependency-vulnerability-gate, test, security-audit, security-testing, code-quality]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Show deployment info
        run: |
          echo "✅ CI/CD Pipeline Complete"
          echo "📦 Build Status: ${{ needs.test.result }}"
          echo "🔒 Security Audit: ${{ needs.security-audit.result }}"
          echo "🛡️ Security Testing: ${{ needs.security-testing.result }}"
          echo "✨ Code Quality: ${{ needs.code-quality.result }}"
          echo ""
          echo "Project Stats:"
          echo "- TypeScript files: $(find src -name '*.ts' | wc -l)"
          echo "- Source size: $(du -sh src | cut -f1)"
          echo "- Modules: $(ls -d src/*/ | wc -l)"
      
      - name: Generate summary
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Dependency Vulnerability Gate**: ${{ needs.dependency-vulnerability-gate.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Test & Build**: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Security Audit**: ${{ needs.security-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Security Testing**: ${{ needs.security-testing.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Code Quality**: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Project Stats" >> $GITHUB_STEP_SUMMARY
          echo "- TypeScript files: $(find src -name '*.ts' | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Source size: $(du -sh src | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "- Modules: $(ls -d src/*/ | wc -l)" >> $GITHUB_STEP_SUMMARY
