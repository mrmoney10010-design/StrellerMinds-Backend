version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
      - "automated-pr"
    commit-message:
      prefix: "chore(deps)"
    groups:
      nestjs:
        patterns:
          - "@nestjs*"
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      types-packages:
        patterns:
          - "@types/*"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
      - "automated-pr"
    commit-message:
      prefix: "chore(ci)"
